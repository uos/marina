# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
# Release Workflow for marina. The schema is just used until there is one for forgejo.

name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_FONTCONFIG_DLOPEN: 1
  CARGO_BUILD_JOBS: 2

jobs:
  sanity-check:
    runs-on: ubuntu-dev-noble-arm
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: |
          apt-get update && apt-get install -y pkg-config cmake libclang-dev clang openssl libssl-dev libsqlite3-dev
          rustup toolchain uninstall stable
          rustup toolchain install stable
      - name: Check
        run: |
          set -euo pipefail
          ulimit -n 65536
          VERSION=$(toml get --raw Cargo.toml package.version)
          echo "Workspace version: $VERSION"

          cargo check --all-features
          cargo publish --dry-run
          cargo clippy --all-targets -- -D warnings

  sanity:
    needs:
      - sanity-check
    strategy:
      matrix:
        include:
          - runner: bookworm
          - runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Docker clean
        run: |
          docker system prune -af

  raw:
    needs:
      - sanity
    strategy:
      matrix:
        include:
          - image: docker.io/stelzo/ubuntu-dev:noble
            arch: amd64
            repo: noble
            runner: ubuntu-latest
          - image: docker.io/stelzo/ubuntu-dev:noble
            arch: arm64
            repo: noble
            runner: ubuntu-latest-arm
          - image: docker.io/stelzo/ubuntu-dev:jammy
            arch: amd64
            repo: jammy
            runner: ubuntu-latest
          - image: docker.io/stelzo/ubuntu-dev:jammy
            repo: jammy
            arch: arm64
            runner: ubuntu-latest-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          IMAGE: ${{ matrix.image }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          ulimit -n 65536
          apt-get update && apt-get install -y pkg-config cmake libclang-dev clang openssl libssl-dev libsqlite3-dev
          rustup toolchain uninstall stable
          rustup toolchain install stable
          mkdir -p "dist/${ARCH}"

          # ------- RAW
          cargo build --release
          cp target/release/marina dist/${ARCH}/

          # ------- DEB
          cargo deb --no-build

          # prepare upload
          mv target/debian/*.deb dist/${ARCH}/

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-raw-${{ matrix.repo }}
          path: dist/

  macos:
    needs:
      - sanity
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: amd64
    runs-on: macos-latest
    env:
      TARGET: ${{ matrix.target }}
      ARCH: ${{ matrix.arch }}
      SDKROOT: /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          rustup toolchain uninstall stable
          rustup toolchain install stable
          rustup target add $TARGET
          ulimit -n 65536
          mkdir -p "dist/${ARCH}"

          export RUSTFLAGS="-C link-arg=-F${SDKROOT}/System/Library/Frameworks -C link-arg=-L${SDKROOT}/usr/lib -C link-arg=-isysroot -C link-arg=${SDKROOT}"
          cargo zigbuild --target $TARGET "$@" --release --bin marina
          mv target/$TARGET/release/marina dist/${ARCH}/

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-macos
          path: dist/

  ros-debs:
    needs:
      - sanity
    strategy:
      matrix:
        include:
          - image: docker.io/stelzo/ubuntu-dev:jazzy
            repo: noble
            runner: ubuntu-latest
          - image: docker.io/stelzo/ubuntu-dev:humble
            repo: jammy
            runner: ubuntu-latest
          - image: docker.io/stelzo/ubuntu-dev:jazzy
            repo: noble
            runner: ubuntu-latest-arm
          - image: docker.io/stelzo/ubuntu-dev:humble
            repo: jammy
            runner: ubuntu-latest-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          ulimit -n 65536
          apt-get update && apt-get install -y pkg-config cmake libclang-dev clang openssl libssl-dev libsqlite3-dev
          rustup toolchain uninstall stable
          rustup toolchain install stable

          for distro in jazzy humble; do
          if [ -f "/opt/ros/$distro/setup.bash" ]; then
            echo "Sourcing ROS distro: $distro"
            . "/opt/ros/$distro/setup.bash"
            export ROS_DISTRO="$distro"
            break
          fi
          done

          if [ -z "${ROS_DISTRO:-}" ]; then
            echo "No supported ROS distro found" >&2
            exit 1
          fi

          bash ./make-deb.bash

      - name: Upload deb
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-ros-debs-${{ matrix.repo }}
          path: |
            *.deb

  cli-musl:
    needs:
      - sanity
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-dev-noble-arm
            arch: amd64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-dev-noble-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
        run: |
          ulimit -n 65536
          apt-get update && apt-get install -y pkg-config cmake libclang-dev clang openssl libssl-dev libsqlite3-dev
          rustup toolchain uninstall stable
          rustup toolchain install stable
          rustup target add $TARGET

          mkdir -p "dist/${ARCH}"

          export RUSTFLAGS="-C target-feature=+crt-static"
          cargo zigbuild --bin marina --release --target $TARGET
          mv target/$TARGET/release/marina dist/${ARCH}/

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-cli-musl
          path: dist/

  clean-4:
    needs:
      - cli-musl
      - ros-debs
      - macos
      - raw
    strategy:
      matrix:
        include:
          - runner: bookworm
          - runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Docker clean
        run: |
          docker system prune -af

  wheels:
    needs:
      - clean-4
    strategy:
      matrix:
        # omitting ppc64le and s390x since they probably have other problems than running this software
        include:
          - target: x86_64-apple-darwin # MacOS x64
            runner: macos-latest
          - target: aarch64-apple-darwin # MacOS Apple Silicon
            runner: macos-latest
          - target: aarch64-unknown-linux-gnu # armv8 gnu (Jetson etc)
            runner: ubuntu-dev-noble-arm
          - target: x86_64-unknown-linux-gnu # x64 gnu
            runner: ubuntu-dev-noble-arm
          - target: x86_64-unknown-linux-musl # musl manylinux x64
            runner: ubuntu-dev-noble-arm
          - target: aarch64-unknown-linux-musl # musl manylinux armv8
            runner: ubuntu-dev-noble-arm
          - target: armv7-unknown-linux-musleabihf # musl manylinux armv7
            runner: ubuntu-dev-noble-arm
    runs-on: ${{ matrix.runner }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        run: |
          ulimit -n 65536
          apt-get update && apt-get install -y pkg-config cmake libclang-dev clang openssl libssl-dev libsqlite3-dev python3 python3-dev
          rustup toolchain uninstall stable
          rustup toolchain install stable
          rustup target add "$TARGET"

          # for ring
          export CFLAGS_aarch64_unknown_linux_gnu="-D__ARM_ARCH=8"

          if [[ "$TARGET" == *apple-darwin* ]]; then
            export SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
            export RUSTFLAGS="-C link-arg=-F${SDKROOT}/System/Library/Frameworks -C link-arg=-L${SDKROOT}/usr/lib -C link-arg=-isysroot -C link-arg=${SDKROOT}"
          fi

          export PATH="/usr/bin:/bin:${PATH}"
          if command -v python3.12 >/dev/null 2>&1; then
            PYTHON_KIND=python3.12
          else
            PYTHON_KIND=python3
          fi

          echo "Using interpreter kind: $PYTHON_KIND"
          command -v "$PYTHON_KIND"
          "$PYTHON_KIND" -V

          # binary
          MATURIN_ARGS="build --zig --manifest-path Cargo.toml --release --target-dir wheels"
          maturin $MATURIN_ARGS --target "$TARGET" -i "$PYTHON_KIND"

          # bindings
          MATURIN_ARGS="build --zig --manifest-path bindings/python/Cargo.toml --release --target-dir wheels"
          maturin $MATURIN_ARGS --target "$TARGET" -i "$PYTHON_KIND"

      - name: Upload wheels
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: target/wheels

  clean-6-5:
    needs:
      - wheels
    strategy:
      matrix:
        include:
          - runner: bookworm
          - runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Docker clean
        run: docker system prune -af

  tarball:
    needs:
      - clean-6-5
    runs-on: ubuntu-dev-noble-arm
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: dl

      - name: Create tarballs
        run: |
          set -euo pipefail
          VERSION=$(toml get --raw Cargo.toml package.version)
          mkdir -p release

          make_tarball() {
            local archive_name=$1; shift
            local staging
            staging=$(mktemp -d)
            local dest="$staging/marina-${VERSION}"
            mkdir -p "$dest"
            for f in "$@"; do
              [ -f "$f" ] && cp "$f" "$dest/"
            done
            # only create if we actually copied files
            if [ "$(ls -A "$dest" 2>/dev/null)" ]; then
              tar -czf "release/${archive_name}.tar.gz" -C "$staging" "marina-${VERSION}"
              echo "  created ${archive_name}.tar.gz"
            else
              echo "  SKIP ${archive_name} (no files found)"
            fi
            rm -rf "$staging"
          }

          echo "=== Linux glibc ==="
          for repo in noble jammy; do
            for arch in amd64 arm64; do
              make_tarball "marina-${VERSION}-linux-${repo}-${arch}" \
                "dl/artifacts-raw-${repo}/${arch}/marina"
            done
          done

          echo "=== Linux musl (static) ==="
          for arch in amd64 arm64; do
            make_tarball "marina-${VERSION}-linux-musl-${arch}" \
              "dl/artifacts-cli-musl/${arch}/marina"
          done

          echo "=== macOS ==="
          for arch in amd64 arm64; do
            make_tarball "marina-${VERSION}-macos-${arch}" \
              "dl/artifacts-macos/${arch}/marina"
          done

          echo "=== cargo-binstall (target-triple named) ==="
          make_tarball "marina-${VERSION}-x86_64-unknown-linux-gnu" \
            "dl/artifacts-raw-noble/amd64/marina"
          make_tarball "marina-${VERSION}-aarch64-unknown-linux-gnu" \
            "dl/artifacts-raw-noble/arm64/marina"
          make_tarball "marina-${VERSION}-x86_64-unknown-linux-musl" \
            "dl/artifacts-cli-musl/amd64/marina"
          make_tarball "marina-${VERSION}-aarch64-unknown-linux-musl" \
            "dl/artifacts-cli-musl/arm64/marina"
          make_tarball "marina-${VERSION}-x86_64-apple-darwin" \
            "dl/artifacts-macos/amd64/marina"
          make_tarball "marina-${VERSION}-aarch64-apple-darwin" \
            "dl/artifacts-macos/arm64/marina"

          echo ""
          echo "=== Release artifacts ==="
          ls -lh release/

      - name: Upload tarballs
        uses: actions/upload-artifact@v3
        with:
          name: release-tarballs
          path: release/

  release:
    needs:
      - tarball
    runs-on: ubuntu-dev-noble-arm
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download tarballs
        uses: actions/download-artifact@v3
        with:
          name: release-tarballs
          path: release

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION=$(toml get --raw Cargo.toml package.version)

          tea login add --name codeberg --url ${{ github.server_url }} --token "${GITHUB_TOKEN}"
          tea release delete --repo ${{ github.repository }} --confirm ${{ github.ref_name }} || true

          # Build --asset flags for every tarball
          ASSET_FLAGS=""
          for f in release/*.tar.gz; do
            [ -f "$f" ] || continue
            ASSET_FLAGS="${ASSET_FLAGS} --asset ${f}"
          done

          echo "=== Uploading $(ls release/*.tar.gz 2>/dev/null | wc -l) assets ==="

          # Create release with all assets in one call
          # tea will fail if the release already exists, so handle that
          if ! tea release create \
            --login codeberg \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${TAG}" \
            --title "${TAG}" \
            --note "Release ${TAG}

          ### Install
          See the documentation for installation instructions.

          ### Artifacts
          - **tar.gz** archives for Linux (noble, jammy, musl) and macOS (amd64, arm64); target-triple archives for \`cargo-binstall\`
          - **.deb** packages published to [PPA](https://codeberg.org/uos-robotics/ppa)
          - **Python wheels** on PyPI and custom index" \
            ${ASSET_FLAGS}; then

            echo "Release may already exist, trying to add assets individually..."
            for f in release/*.tar.gz; do
              [ -f "$f" ] || continue
              echo "  uploading $(basename "$f")..."
              tea release create \
                --login codeberg \
                --repo "${GITHUB_REPOSITORY}" \
                --tag "${TAG}" \
                --title "${TAG}" \
                --asset "$f" 2>/dev/null || true
            done
          fi

          echo "Release ${TAG} published."

  publish-ppa:
    needs:
      - release
    runs-on: ubuntu-dev-noble-arm
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: dl

      - name: Publish to PPA
        env:
          PPA_DEPLOY_KEY: ${{ secrets.PPA_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          apt-get update -y && apt-get install -y ssh

          # ── Collect .deb files by series ──────────────────────
          mkdir -p staging/noble staging/jammy

          # raw
          for repo in noble jammy; do
            find "dl/artifacts-raw-${repo}" -name '*.deb' -exec cp {} "staging/${repo}/" \; 2>/dev/null || true
          done

          # ros-debs
          for repo in noble jammy; do
            find "dl/artifacts-ros-debs-${repo}" -name '*.deb' -exec cp {} "staging/${repo}/" \; 2>/dev/null || true
          done

          echo "=== Collected .deb files ==="
          echo "noble: $(ls staging/noble/*.deb 2>/dev/null | wc -l) packages"
          echo "jammy:  $(ls staging/jammy/*.deb 2>/dev/null | wc -l) packages"

          # ── Collect wheels by variant ─────────────────────────
          mkdir -p staging-whl/cpu

          # CPU wheels
          find "dl/wheels" -name '*.whl' -exec cp {} staging-whl/cpu/ \; 2>/dev/null || true

          echo ""
          echo "=== Collected wheels ==="
          for v in cpu; do
            echo "${v}: $(ls staging-whl/${v}/*.whl 2>/dev/null | wc -l) wheels"
          done

          # ── Helper: build PEP 503 simple index ────────────────
          build_pep503_index() {
            local base_dir=$1  # e.g. whl/cpu

            # Organise wheels into per-package subdirectories
            for whl in "$base_dir"/*.whl; do
              [ -f "$whl" ] || continue
              # normalised package name: lowercase, [-_.] → -
              local pkg
              pkg=$(basename "$whl" | sed 's/-[0-9].*//' | tr '[:upper:]_.' '[:lower:]--' | sed 's/--*/-/g')
              mkdir -p "$base_dir/$pkg"
              mv "$whl" "$base_dir/$pkg/"
            done

            # Per-package index.html
            for pkg_dir in "$base_dir"/*/; do
              [ -d "$pkg_dir" ] || continue
              {
                echo '<!DOCTYPE html><html><body>'
                for whl in "$pkg_dir"/*.whl; do
                  [ -f "$whl" ] || continue
                  local fname hash
                  fname=$(basename "$whl")
                  hash=$(sha256sum "$whl" | awk '{print $1}')
                  echo "<a href=\"${fname}#sha256=${hash}\">${fname}</a><br/>"
                done
                echo '</body></html>'
              } > "$pkg_dir/index.html"
            done

            # Root index.html (lists packages)
            {
              echo '<!DOCTYPE html><html><body>'
              for pkg_dir in "$base_dir"/*/; do
                [ -d "$pkg_dir" ] || continue
                local pkg_name
                pkg_name=$(basename "$pkg_dir")
                echo "<a href=\"${pkg_name}/\">${pkg_name}</a><br/>"
              done
              echo '</body></html>'
            } > "$base_dir/index.html"
          }

          # ── Push to PPA git repo ──────────────────────────────
          mkdir -p ~/.ssh
          printf '%s\n' "$PPA_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'

          git clone --depth 1 --filter=blob:none --sparse ssh://git@codeberg.org/uos-robotics/ppa.git ppa
          cd ppa
          git sparse-checkout init --cone
          git sparse-checkout set \
            ubuntu/pool/main/noble \
            ubuntu/pool/main/jammy \
            whl/cpu \
            bin

          # Copy debs
          for series in noble jammy; do
            mkdir -p "ubuntu/pool/main/${series}"
            cp ../staging/${series}/*.deb "ubuntu/pool/main/${series}/" 2>/dev/null || true
          done

          # Copy wheels and build PEP 503 indices
          for variant in cpu; do
            mkdir -p "whl/${variant}"
            cp ../staging-whl/${variant}/*.whl "whl/${variant}/" 2>/dev/null || true
            build_pep503_index "whl/${variant}"
          done

          # Copy macOS and musl tarballs
          mkdir -p bin
          find "../dl/release-tarballs" -name 'marina-*-macos-*.tar.gz' -exec cp {} bin/ \; 2>/dev/null || true
          find "../dl/release-tarballs" -name 'marina-*-linux-musl-*.tar.gz' -exec cp {} bin/ \; 2>/dev/null || true

          # Commit and push
          git add ubuntu/ whl/ bin/
          git config --global user.email "$(git log -1 --pretty=format:'%ae')"
          git config --global user.name "$(git log -1 --pretty=format:'%an')"
          git commit -m "ci: add debs and wheels from ${FORGEJO_REPOSITORY}@${FORGEJO_SHA}" || echo "No changes to commit"
          git push origin pages

          # Cleanup
          shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key
          cd ..

          echo ""
          echo "=== PPA published ==="

  aur:
    runs-on: ubuntu-dev-noble
    needs:
      - release
      - publish-ppa
    container:
      image: archlinux:latest
    steps:
      - name: Deps
        run: |
          sudo pacman -Sy openssh git nodejs
      - uses: actions/checkout@v4
      - name: Update AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/aur_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'

          git config --global user.email $(git log -1 --pretty=format:'%ae')
          git config --global user.name $(git log -1 --pretty=format:'%an')

          git clone ssh://aur@aur.archlinux.org/marina-bin.git marina-bin
          cp packaging/arch-bin/PKGBUILD marina-bin/
          cd marina-bin
          makepkg --printsrcinfo > .SRCINFO
          git add -f .SRCINFO PKGBUILD
          git commit -m "Update package from $GITHUB_REPOSITORY@$GITHUB_SHA"
          git push origin
          shred -u ~/.ssh/aur_key || rm -f ~/.ssh/aur_key

  homebrew:
    runs-on: ubuntu-dev-noble-arm
    needs:
      - publish-ppa
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download release tarballs
        uses: actions/download-artifact@v3
        with:
          name: release-tarballs
          path: release

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          VERSION=$(toml get --raw Cargo.toml package.version)
          apt-get update -y && apt-get install -y keychain

          ARM_SHA256=$(sha256sum "release/marina-${VERSION}-macos-arm64.tar.gz" | awk '{print $1}')
          X86_SHA256=$(sha256sum "release/marina-${VERSION}-macos-amd64.tar.gz" | awk '{print $1}')

          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/ARM_SHA256_PLACEHOLDER/${ARM_SHA256}/g" \
            -e "s/X86_SHA256_PLACEHOLDER/${X86_SHA256}/g" \
            packaging/homebrew/marina.rb > /tmp/marina.rb

          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/tap_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'

          git config --global user.email "$(git log -1 --pretty=format:'%ae')"
          git config --global user.name "$(git log -1 --pretty=format:'%an')"

          git clone git@github.com:uos/homebrew-marina.git homebrew-marina
          mkdir -p homebrew-marina/Formula
          cp /tmp/marina.rb homebrew-marina/Formula/marina.rb
          cd homebrew-marina
          git add Formula/marina.rb
          git commit -m "marina ${VERSION}"
          git push origin
          shred -u ~/.ssh/tap_key || rm -f ~/.ssh/tap_key

  publish-crates:
    needs:
      - release
    runs-on: ubuntu-dev-noble-arm
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: |
          apt-get update && apt-get install -y pkg-config cmake libclang-dev clang openssl libssl-dev libsqlite3-dev
          rustup toolchain uninstall stable
          rustup toolchain install stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish

  publish-pypi:
    needs:
      - release
    runs-on: ubuntu-dev-noble-arm
    steps:
      - name: Download CPU wheels
        uses: actions/download-artifact@v3
        with:
          name: wheels
          path: dist
      - name: Get twine
        run: uv tool install twine
      - name: Publish to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -euo pipefail

          echo "=== Wheels to publish ==="
          ls -lh dist/*.whl 2>/dev/null || true

          twine upload \
            --username __token__ \
            --password "${PYPI_TOKEN}" \
            --non-interactive \
            --skip-existing \
            --verbose \
            dist/*.whl

          echo "Published to PyPI."
